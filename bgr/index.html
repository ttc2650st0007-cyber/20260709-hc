<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>背景の繰り返し background-repeat:</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>背景の繰り返し background-repeat:</h1>

    <div class="repeat">repeat（縦横）</div>
<div class="no-repeat">no-repeat（繰り返しなし）</div>
<div class="repeat-x">repeat-x（横方向のみ）</div>
<div class="repeat-y">repeat-y（縦方向のみ）</div>
</body>

</html>
